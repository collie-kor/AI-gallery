<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIGallery — AI 이미지 공유 커뮤니티</title>
  <meta name="description" content="AI로 만든 이미지를 공유하고 둘러보는 커뮤니티 AIGallery. 로그인하고 당신의 AI 작품을 올려보세요." />
  <!-- google-site-verification 메타는 Search Console 인증 코드를 받으면 여기에 추가합니다 -->

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="login-page">
  <div class="login-wrap">
    <div class="login-card">
      <a href="#" class="logo logo-center">
        <span class="logo-mark">✦</span> AI<span class="logo-accent">Gallery</span>
      </a>
      <p class="login-sub">AI 아트를 공유하는 커뮤니티에 오신 걸 환영합니다.</p>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">로그인</button>
        <button class="auth-tab" data-tab="signup">회원가입</button>
      </div>

      <!-- 소셜 로그인 -->
      <div class="social-btns">
        <button class="btn-social" id="googleBtn" type="button">
          <span class="g-icon">G</span> Google로 계속하기
        </button>
      </div>
      <div class="divider"><span>또는 이메일로</span></div>

      <form id="authForm" autocomplete="off" class="auth-form">
        <label class="signup-only" hidden>이름
          <input type="text" id="authName" placeholder="표시할 이름" />
        </label>
        <label>이메일
          <input type="email" id="authEmail" required placeholder="you@example.com" />
        </label>
        <label>비밀번호
          <input type="password" id="authPassword" required minlength="6" placeholder="6자 이상" />
        </label>
        <p class="form-error" id="authError" hidden></p>
        <p class="form-note" id="authNote" hidden></p>
        <button type="submit" class="btn btn-primary btn-block" id="authSubmit">로그인</button>
      </form>

      <p class="login-foot"><a href="gallery.html">로그인 없이 갤러리 둘러보기 →</a></p>
      <p class="login-foot"><a href="privacy.html">개인정보처리방침</a></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
</body>
</html>
